<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(90deg, rgba(119, 62, 140, 1) 40%, rgba(97, 105, 156, 1) 59%, rgba(89, 119, 190, 1) 74%);
            background: linear-gradient(90deg, rgba(119, 62, 140, 1) 17%, rgba(97, 105, 156, 1) 59%, rgba(89, 119, 190, 1) 74%, rgba(87, 199, 133, 1) 0%, ) 100%;
            padding: 500px 500px;
            display: flex;
            flex-direction: row;

        }

        div {

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: antiquewhite;
            border-radius: 50px;
            height: 750px;

        }

        input {
            display: flex;
            flex-direction: row;
            border-radius: 50px;
            width: 130px;
            align-items: normal;
            gap: 10px;
            flex-wrap: wrap;
            padding: 8px 12px;
            cursor: pointer;


        }


        h1 {
            background-color: rgb(16, 62, 131);
            border-radius: 100px;
            padding: 60px;
            margin: 50px 50px 50px 50px;
            font-size: 100px;
        }

        h2 {
            font-size: 40px;
        }

        .dev {
            color: rgb(16, 93, 129);
        }

        .txt {
            font-family: italic;
            text-align: center;
        }

        .btn2 {
            color: rgb(248, 248, 248);
            width: 180px;
            height: 40px;
        }

        ul {
            display: flex;
            gap: 10px;
            cursor: pointer;
            list-style: none;

        }

        ul li {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            background-color: rgba(219, 109, 6, 0.808);
            border-radius: 10px;
            width: 90px;
            height: 40px;
            font-size: 20px;
            flex-wrap: wrap;
        }

        ul li:hover {
            background-color: blue;
        }
    </style>
</head>

<body>

    <div>
        <h1>JF</h1>
        <h2>Jean Fraga</h2><br />
        <h3 class="dev">Desenvolvedor Mobile</h3><br />
        <h3 class="txt">Apaixonado por criar Experiencias digitais incriveis.
            Especializado em Javascript, Dark, Kotlin e Python com Foco em Desenvolvimento Mobile.<br /><br />
            <h3>Habilidades</h3><br />
            <ul>
                <li>Javascript</li>
                <li>Dart</li>
                <li>Kotlin</li>
                <li>Python</li><br /><br>
                <li>Entre em Contato</li>
            </ul>
        </h3>
    </div>


</body>

</html>
